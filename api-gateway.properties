spring.application.name=API-GATEWAY

server.port=9090

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Actuator
management.endpoints.web.exposure.include=*

# Gateway Routes
spring.cloud.gateway.server.webmvc.routes[0].id=employee-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://EMPLOYEE-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/employees/**

spring.cloud.gateway.server.webmvc.routes[1].id=department-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://DEPARTMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/departments/**

spring.cloud.gateway.server.webmvc.routes[2].id=payroll-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PAYROLL-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/payroll/**

spring.cloud.gateway.server.webmvc.routes[3].id=report-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://REPORT-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/reports/**
